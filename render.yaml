# Deploy miễn phí: https://render.com → New → Blueprint
services:
  - type: web
    name: ban-tt-sk-phuoc-hoa
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn wsgi:app --bind 0.0.0.0:$PORT --workers 1 --threads 4 --timeout 120
    healthCheckPath: /
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.8"
      - key: DEPLOY_MODE
        value: production
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_GROUP_CHAT_ID
        sync: false
      - key: ADMIN_PIN
        sync: false
      - key: CRON_SECRET
        generateValue: true
      - key: WEBHOOK_SECRET
        generateValue: true
      - key: TZ
        value: Asia/Ho_Chi_Minh
